<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#F5F0E8"/>
  <g stroke="#8B1A1A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Coffee bag body -->
    <path d="M175 180 C170 180, 155 185, 150 200 L130 480 C128 500, 140 520, 165 525 L435 525 C460 520, 472 500, 470 480 L450 200 C445 185, 430 180, 425 180 Z"/>
    <!-- Bag top fold -->
    <path d="M175 180 C175 155, 185 140, 220 135 L380 135 C415 140, 425 155, 425 180"/>
    <!-- Bag fold lines -->
    <path d="M200 135 L210 105 C215 95, 240 88, 300 85 C360 88, 385 95, 390 105 L400 135"/>
    <!-- Bag tie -->
    <path d="M270 105 C275 90, 285 82, 300 80 C315 82, 325 90, 330 105"/>

    <!-- Rolling hills motif -->
    <g stroke-width="3.5">
      <!-- Back hill (tallest) -->
      <path d="M190 400 C220 340, 260 300, 300 295 C340 300, 380 340, 410 400"/>
      <!-- Middle hill -->
      <path d="M175 420 C210 370, 250 350, 280 355 C310 360, 340 385, 370 420"/>
      <!-- Front hill -->
      <path d="M195 430 C230 400, 280 390, 320 395 C360 400, 390 415, 420 430"/>
      <!-- Small trees on hills -->
      <path d="M260 340 L260 325 C255 315, 260 305, 265 310 C270 305, 275 315, 270 325" stroke-width="2.5"/>
      <path d="M340 350 L340 335 C335 325, 340 315, 345 320 C350 315, 355 325, 350 335" stroke-width="2.5"/>
      <path d="M300 365 L300 350 C295 340, 300 330, 305 335 C310 330, 315 340, 310 350" stroke-width="2.5"/>
    </g>

    <!-- Label line -->
    <path d="M220 470 L380 470" stroke-width="2"/>

    <!-- Coffee beans -->
    <g transform="translate(95, 465) rotate(-20)">
      <ellipse cx="0" cy="0" rx="24" ry="15"/>
      <path d="M-14 -8 C-4 0, 6 0, 16 -8"/>
    </g>
    <g transform="translate(490, 445) rotate(25)">
      <ellipse cx="0" cy="0" rx="24" ry="15"/>
      <path d="M-14 -8 C-4 0, 6 0, 16 -8"/>
    </g>
    <g transform="translate(500, 510) rotate(-10)">
      <ellipse cx="0" cy="0" rx="20" ry="12"/>
      <path d="M-12 -6 C-3 0, 5 0, 13 -6"/>
    </g>
