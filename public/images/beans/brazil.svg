<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#F5F0E8"/>
  <g stroke="#8B1A1A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Coffee bag body -->
    <path d="M175 180 C170 180, 155 185, 150 200 L130 480 C128 500, 140 520, 165 525 L435 525 C460 520, 472 500, 470 480 L450 200 C445 185, 430 180, 425 180 Z"/>
    <!-- Bag top fold -->
    <path d="M175 180 C175 155, 185 140, 220 135 L380 135 C415 140, 425 155, 425 180"/>
    <!-- Bag fold lines -->
    <path d="M200 135 L210 105 C215 95, 240 88, 300 85 C360 88, 385 95, 390 105 L400 135"/>
    <!-- Bag tie -->
    <path d="M270 105 C275 90, 285 82, 300 80 C315 82, 325 90, 330 105"/>

    <!-- Coffee plant / leaf motif -->
    <g stroke-width="3.5">
      <!-- Main stem -->
      <path d="M300 430 L300 280"/>
      <!-- Large leaf left -->
      <path d="M300 320 C270 310, 230 330, 220 360 C215 380, 235 395, 265 385 C285 378, 298 350, 300 320"/>
      <!-- Leaf vein left -->
      <path d="M300 320 C275 335, 250 355, 235 375" stroke-width="2.5"/>
      <!-- Large leaf right -->
      <path d="M300 300 C330 290, 370 305, 380 335 C385 355, 370 370, 340 365 C320 358, 303 335, 300 300"/>
      <!-- Leaf vein right -->
      <path d="M300 300 C325 315, 350 335, 365 350" stroke-width="2.5"/>
      <!-- Small leaf top-left -->
      <path d="M300 285 C280 275, 260 280, 255 298 C252 310, 268 318, 285 308 C295 300, 300 290, 300 285"/>
      <!-- Small leaf top-right -->
      <path d="M300 280 C315 268, 335 272, 340 288 C343 300, 330 308, 316 300 C307 294, 301 286, 300 280"/>
      <!-- Coffee cherries (small circles) -->
      <circle cx="260" cy="345" r="8" stroke-width="3"/>
      <circle cx="248" cy="360" r="7" stroke-width="3"/>
      <circle cx="345" cy="325" r="8" stroke-width="3"/>
      <circle cx="358" cy="340" r="7" stroke-width="3"/>
    </g>

    <!-- Label line -->
    <path d="M220 470 L380 470" stroke-width="2"/>

    <!-- Coffee beans -->
    <g transform="translate(95, 460) rotate(-30)">
      <ellipse cx="0" cy="0" rx="24" ry="15"/>
      <path d="M-14 -8 C-4 0, 6 0, 16 -8"/>
    </g>
    <g transform="translate(490, 440) rotate(20)">
      <ellipse cx="0" cy="0" rx="24" ry="15"/>
      <path d="M-14 -8 C-4 0, 6 0, 16 -8"/>
    </g>
    <g transform="translate(110, 530) rotate(15)">
      <ellipse cx="0" cy="0" rx="20" ry="12"/>
      <path d="M-12 -6 C-3 0, 5 0, 13 -6"/>
    </g>
  </g>
</svg>
