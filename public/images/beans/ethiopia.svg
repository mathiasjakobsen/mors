<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#F5F0E8"/>
  <g stroke="#8B1A1A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Coffee bag body -->
    <path d="M175 180 C170 180, 155 185, 150 200 L130 480 C128 500, 140 520, 165 525 L435 525 C460 520, 472 500, 470 480 L450 200 C445 185, 430 180, 425 180 Z"/>
    <!-- Bag top fold -->
    <path d="M175 180 C175 155, 185 140, 220 135 L380 135 C415 140, 425 155, 425 180"/>
    <!-- Bag fold lines -->
    <path d="M200 135 L210 105 C215 95, 240 88, 300 85 C360 88, 385 95, 390 105 L400 135"/>
    <!-- Bag tie -->
    <path d="M270 105 C275 90, 285 82, 300 80 C315 82, 325 90, 330 105"/>

    <!-- Ethiopian geometric zigzag pattern -->
    <g stroke-width="3">
      <!-- Zigzag row 1 -->
      <path d="M200 280 L220 260 L240 280 L260 260 L280 280 L300 260 L320 280 L340 260 L360 280 L380 260 L400 280"/>
      <!-- Zigzag row 2 -->
      <path d="M200 310 L220 290 L240 310 L260 290 L280 310 L300 290 L320 310 L340 290 L360 310 L380 290 L400 310"/>
      <!-- Zigzag row 3 -->
      <path d="M200 340 L220 320 L240 340 L260 320 L280 340 L300 320 L320 340 L340 320 L360 340 L380 320 L400 340"/>
      <!-- Diamond pattern row -->
      <path d="M230 380 L260 360 L290 380 L260 400 Z"/>
      <path d="M310 380 L340 360 L370 380 L340 400 Z"/>
      <!-- Small triangles -->
      <path d="M210 420 L230 400 L250 420"/>
      <path d="M270 420 L290 400 L310 420"/>
      <path d="M330 420 L350 400 L370 420"/>
    </g>

    <!-- ETHIOPIA text area - simple label line -->
    <path d="M220 470 L380 470" stroke-width="2"/>

    <!-- Coffee beans -->
    <g transform="translate(95, 460) rotate(-20)">
      <ellipse cx="0" cy="0" rx="24" ry="15"/>
      <path d="M-14 -8 C-4 0, 6 0, 16 -8"/>
    </g>
    <g transform="translate(490, 430) rotate(25)">
      <ellipse cx="0" cy="0" rx="24" ry="15"/>
      <path d="M-14 -8 C-4 0, 6 0, 16 -8"/>
    </g>
    <g transform="translate(505, 495) rotate(-15)">
      <ellipse cx="0" cy="0" rx="20" ry="12"/>
      <path d="M-12 -6 C-3 0, 5 0, 13 -6"/>
    </g>
  </g>
</svg>
